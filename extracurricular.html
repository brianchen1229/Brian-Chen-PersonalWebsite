<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Extracurricular | Po-Wei (Brian) Chen</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <style>
        /* 繼承 Research 頁面的卡片樣式 */
        .pub-list {
            list-style: none;
            margin-left: 0;
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .pub-list li {
            background: #ffffff;
            padding: 1.5rem;
            border-radius: 0.75rem;
            box-shadow: 0 4px 10px rgba(15, 23, 42, 0.06);
            border: 1px solid #e5e7eb;
        }

        .section h3 {
            border-left: 4px solid #2563eb;
            padding-left: 0.75rem;
            margin-bottom: 1.2rem;
            color: #111827;
        }

        /* 嚴格控制照片大小與對齊 */
        .photo-grid {
            margin-top: 1.2rem;
            display: flex;
            gap: 1rem;
            justify-content: flex-start;
            align-items: stretch;
        }

        .photo-item {
            flex: 0 0 25%;    
            max-width: 200px; 
            height: 150px;    
            object-fit: cover;
            border-radius: 0.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        @media (max-width: 640px) {
            .photo-grid {
                flex-wrap: wrap;
            }
            .photo-item {
                flex: 0 0 45%; 
                max-width: 100%;
                height: 120px;
            }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="nav-container">
            <a href="index.html" class="brand">Po-Wei (Brian) Chen</a>
            <nav class="nav-links">
                <a href="research.html">Research</a>
                <a href="extracurricular.html">Extracurricular</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="section">
            <div class="section-container">
                <h2>Extracurricular Activities</h2>

                <!-- Basketball Section -->
                <h3>Basketball</h3>
                <ul class="pub-list">
                    <li>
                        <strong>Department Basketball Team Vice Captain</strong>
                        <p style="font-size: 0.95rem; color: #4b5563; margin-top: 0.5rem;">
                            Financial Engineering and Actuarial Mathematics, Soochow University.
                        </p>
                        <div class="photo-grid">
                            <img src="Basketball_1.jpg" alt="Basketball action" class="photo-item" />
                            <img src="Basketball_2.jpg" alt="Team photo" class="photo-item" />
                        </div>
                    </li>
                </ul>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-container">
            <p>&copy; <span id="year"></span> Po-Wei (Brian) Chen</p>
        </div>
    </footer>

    <script>
        document.getElementById("year").textContent = new Date().getFullYear();
    </script>
</body>
</html>
